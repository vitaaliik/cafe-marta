{% extends "base.html" %}

{% block title %}Редагування страви | Кафе Марта{% endblock %}

{% block content %}
<section class="section">
    <h2 class="page-title">Редагування страви</h2>
    <p class="page-description">
        Тут можна змінити назву, опис, вагу, ціну та категорію страви.
    </p>
</section>

<section class="section">
    <div class="admin-form-box">
        <form action="/admin/edit/{{ product.id }}" method="post" enctype="multipart/form-data" class="admin-form">
            <label>Назва страви</label>
            <input type="text" name="name" value="{{ product.name }}" required>

            <label>Опис</label>
            <textarea name="description">{{ product.description }}</textarea>

            <label>Вага</label>
            <input type="text" name="weight" value="{{ product.weight }}">

            <label>Ціна</label>
            <input type="number" step="0.01" name="price" value="{{ product.price }}" required>

            <label>Категорія</label>
            <select name="category" id="category" required onchange="updateSubcategories()">
                <option value="Основне меню" {% if product.category == "Основне меню" %}selected{% endif %}>Основне меню</option>
                <option value="Десерти" {% if product.category == "Десерти" %}selected{% endif %}>Десерти</option>
                <option value="Піца" {% if product.category == "Піца" %}selected{% endif %}>Піца</option>
                <option value="Алкогольні напої" {% if product.category == "Алкогольні напої" %}selected{% endif %}>Алкогольні напої</option>
                <option value="Безалкогольні напої" {% if product.category == "Безалкогольні напої" %}selected{% endif %}>Безалкогольні напої</option>
                <option value="Коктейлі" {% if product.category == "Коктейлі" %}selected{% endif %}>Коктейлі</option>
            </select>

            <label>Підкатегорія</label>
            <select name="subcategory" id="subcategory">
                <option value="{{ product.subcategory }}">{{ product.subcategory }}</option>
            </select>
            
            <label>Нове фото страви</label>
<input type="file" name="image" accept="image/*">

{% if product.image_filename %}
    <p>Поточне фото:</p>
    <img src="/uploads/{{ product.image_filename }}" alt="{{ product.name }}" style="max-width: 220px; border-radius: 12px; margin-top: 8px; display: block;">

    <a href="/admin/delete-photo/{{ product.id }}"
       class="delete-photo-link"
       onclick="return confirm('Точно видалити фото цієї страви?')">
       Видалити фото
    </a>
{% endif %}
            <button type="submit">Зберегти зміни</button>
        </form>
    </div>
</section>

<script>
    function updateSubcategories(selectedValue = null) {
        const category = document.getElementById("category").value;
        const subcategory = document.getElementById("subcategory");

        const options = {
            "Основне меню": [
                "Холодні закуски",
                "Салати",
                "Перші страви",
                "Гарячі страви",
                "Страви на мангалі",
                "Овочі гриль"
            ],
            "Алкогольні напої": [
                "Алкогольні напої",
                "Слабоалкогольні напої",
                "До пива"
            ],
            "Безалкогольні напої": [
                "Гарячі напої",
                "Холодні напої"
            ],
            "Коктейлі": [
                "Коктейлі алкогольні",
                "Коктейлі безалкогольні"
            ],
            "Піца": [
                "Без підкатегорії"
            ],
            "Десерти": [
                "Без підкатегорії"
            ]
        };

        const currentValue = selectedValue || "{{ product.subcategory }}";

        subcategory.innerHTML = "";

        if (options[category]) {
            options[category].forEach(function(item) {
                const option = document.createElement("option");
                option.value = item;
                option.textContent = item;

                if (item === currentValue) {
                    option.selected = true;
                }

                subcategory.appendChild(option);
            });
        }
    }

    window.onload = function() {
        updateSubcategories("{{ product.subcategory }}");
    };
</script>
{% endblock %}
